name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run mini simulation (5s)
        run: |
          python -c "
          from src.config import ExperimentConfig
          from src.simulation import TechGrowthPipelineSimulation
          cfg = ExperimentConfig(sim_duration_ms=5000, partition_enabled=False)
          sim = TechGrowthPipelineSimulation(cfg)
          m = sim.run()
          assert m['total_events'] > 0
          assert m['sla_compliance_pct'] > 95
          print('Mini simulation OK')
          "
